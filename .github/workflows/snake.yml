name: 🌸 Update my contribution garden

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Create pink contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#7c6af7&color_dots=#ebedf0,#d7cdfc,#b9abf7,#9886ec,#7c6af7
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#b8a9ff&color_dots=#161b22,#29234a,#453b78,#6a5baa,#b8a9ff
            
      - name: Publish animation
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
