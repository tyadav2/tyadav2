name: Update contribution garden

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate contribution animations
        uses: Platane/snk@v3
        with:
          github_user_name: tyadav2
          outputs: |
            dist/github-snake.svg?color_snake=#7c6af7&color_dots=#ebedf0,#d7cdfc,#b9abf7,#9886ec,#7c6af7
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#b8a9ff&color_dots=#161b22,#29234a,#453b78,#6a5baa,#b8a9ff

      - name: Publish animation
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
